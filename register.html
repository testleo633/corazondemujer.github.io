<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear membresía | Corazón de Mujer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="site-header-inner">
        <div class="brand">
          <span class="brand-heart">♥</span>
          <span class="brand-text">Corazón de Mujer</span>
        </div>
      </div>
    </header>

    <main class="main-wrap">
      <div class="container">
        <div class="hero-center">
          <div class="eyebrow"><span class="spark">✦</span> Comunidad exclusiva de mujeres</div>
          <h1 class="hero-title">Crea tu <span class="rosa">tarjeta</span></h1>
          <p class="hero-subtitle">
            Registra tu perfil para generar una tarjeta digital elegante con QR único,
            lista para compartir en eventos, networking y membresías.
          </p>
        </div>

        <div class="card-surface form-card">
          <form id="registerForm">
            <div class="form-grid">
              <div class="full">
                <label class="label" for="full_name">Nombre completo</label>
                <input class="input" type="text" id="full_name" placeholder="Ej. Leonardo Saucedo" required />
              </div>

              <div>
                <label class="label" for="email">Correo</label>
                <input class="input" type="email" id="email" placeholder="correo@ejemplo.com" />
              </div>

              <div>
                <label class="label" for="phone">Teléfono</label>
                <input class="input" type="text" id="phone" placeholder="6560000000" />
              </div>

              <div>
                <label class="label" for="company">Empresa</label>
                <input class="input" type="text" id="company" placeholder="Nombre de empresa" />
              </div>

              <div>
                <label class="label" for="role">Puesto</label>
                <input class="input" type="text" id="role" placeholder="Ej. Fundadora / CEO" />
              </div>

              <div class="full">
                <label class="label" for="bio">Descripción breve</label>
                <textarea class="textarea" id="bio" placeholder="Escribe una breve descripción profesional o personal"></textarea>
              </div>
            </div>

            <div class="actions">
              <button type="submit" class="btn-primary">Obtener mi tarjeta</button>
            </div>

            <div id="msg" class="status-msg"></div>
          </form>

          <div class="footer-note">
            Al registrar tus datos, se generará una tarjeta digital con URL pública y QR único.
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js"></script>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  async function validateToken() {
    const msg = document.getElementById("msg");

    if (!token) {
      msg.textContent = "Este enlace no tiene token.";
      document.getElementById("registerForm").style.display = "none";
      return;
    }

    const { data, error } = await supabaseClient
      .from("profiles")
      .select("id, public_slug, is_claimed, claim_token")
      .eq("claim_token", token)
      .single();

    if (error || !data) {
      msg.textContent = "Este enlace no es válido.";
      document.getElementById("registerForm").style.display = "none";
      return;
    }

    if (data.is_claimed) {
      msg.innerHTML = `Este enlace ya fue usado. <br><a href="./card.html?slug=${data.public_slug}">Ver tarjeta</a>`;
      document.getElementById("registerForm").style.display = "none";
      return;
    }

    window.currentProfileId = data.id;
    window.currentProfileSlug = data.public_slug;
  }

  document.getElementById("registerForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const full_name = document.getElementById("full_name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const company = document.getElementById("company").value.trim();
    const role = document.getElementById("role").value.trim();
    const bio = document.getElementById("bio").value.trim();

    const msg = document.getElementById("msg");
    msg.textContent = "Guardando datos...";

    const { error } = await supabaseClient
      .from("profiles")
      .update({
        full_name,
        email,
        phone,
        company,
        role,
        bio,
        is_claimed: true,
        is_public: true
      })
      .eq("id", window.currentProfileId);

    if (error) {
      msg.textContent = "Error: " + error.message;
      return;
    }

    window.location.href = "./card.html?slug=" + window.currentProfileSlug;
  });

  validateToken();
</script>
  
</body>
</html>
