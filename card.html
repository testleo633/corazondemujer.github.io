<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjeta digital | Corazón de Mujer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="site-header-inner">
        <div class="brand">
          <span class="brand-heart">♥</span>
          <span class="brand-text">Corazón de Mujer</span>
        </div>
      </div>
    </header>

    <main class="main-wrap">
      <div class="container">
        <div class="hero-center">
          <div class="eyebrow"><span class="spark">✦</span> Tarjeta digital de membresía</div>
        </div>

        <div class="card-surface profile-card" id="card">
          Cargando tarjeta...
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    async function loadCard() {
      const card = document.getElementById("card");

      if (!slug) {
        card.innerHTML = `
          <div class="not-found">
            <h2>Tarjeta no encontrada</h2>
            <p>Falta el identificador en la URL.</p>
          </div>
        `;
        return;
      }

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("full_name, email, phone, company, role, bio, public_slug")
        .eq("public_slug", slug)
        .eq("is_public", true)
        .single();

      if (error || !data) {
        card.innerHTML = `
          <div class="not-found">
            <h2>Tarjeta pendiente de activación</h2>
            <p>Esta membresía aún no ha sido activada. Si eres la propietaria, usa tu enlace privado de registro para completar tu perfil.</p>
          </div>
        `;
        return;
      }

      const currentUrl = window.location.href;
      const qrUrl =
        "https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=" +
        encodeURIComponent(currentUrl);

      card.innerHTML = `
        <div class="profile-badge"><span class="spark" style="color:#FF3EA5;">✦</span> Perfil activo</div>

        <h1 class="profile-name">
          ${data.full_name || ""}
        </h1>

        <div class="profile-meta">
          ${data.role ? `<div class="meta-chip">${data.role}</div>` : ""}
          ${data.company ? `<div class="meta-chip">${data.company}</div>` : ""}
          ${data.phone ? `<div class="meta-chip">${data.phone}</div>` : ""}
          ${data.email ? `<div class="meta-chip">${data.email}</div>` : ""}
        </div>

        ${data.bio ? `<div class="bio-block">${data.bio}</div>` : ""}

        <div class="qr-wrap">
          <div class="qr-box">
            <img src="${qrUrl}" alt="QR de la tarjeta">
          </div>

          <div class="card-link">
            <a href="${currentUrl}" target="_blank">${currentUrl}</a>
          </div>

          <div class="dual-actions">
            <a class="btn-primary" href="${currentUrl}" target="_blank">Abrir tarjeta</a>
            <a class="btn-secondary" href="./register.html">Crear otra</a>
          </div>
        </div>
      `;
    }

    loadCard();
  </script>
</body>
</html>
